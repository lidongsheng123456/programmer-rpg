name: DevQuest
options:
  bundleIdPrefix: com.devquest
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Resources/Info.plist

targets:
  DevQuest:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Core
      - path: Domain
      - path: Data
      - path: Features
      - path: DesignSystem
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.devquest.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    entitlements:
      path: DevQuest.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups:
          - group.com.devquest.shared

  DevQuestWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Core/Config
      - path: Core/Persistence
      - path: Core/Extensions
      - path: Domain/Entities
      - path: Data/DataSources/Local
      - path: DesignSystem/Theme
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.devquest.app.widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    entitlements:
      path: DevQuestWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.devquest.shared
    dependencies:
      - target: DevQuest
        embed: false

schemes:
  DevQuest:
    build:
      targets:
        DevQuest: all
        DevQuestWidget: all
    run:
      config: Debug
    archive:
      config: Release
