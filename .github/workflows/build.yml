name: "\u6784\u5efa DevQuest iOS \u5e94\u7528"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: "\u62c9\u53d6\u4ee3\u7801"
        uses: actions/checkout@v4

      - name: "\u9009\u62e9 Xcode \u7248\u672c"
        run: |
          echo "\u53ef\u7528 Xcode \u7248\u672c:"
          ls -d /Applications/Xcode*.app 2>/dev/null

          # \u4f18\u5148\u9009\u62e9\u7a33\u5b9a\u7248 Xcode 16.x\uff0c\u907f\u514d beta \u7248\u672c
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          fi
          echo "\u5df2\u9009\u62e9: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: "\u663e\u793a Xcode \u7248\u672c\u4fe1\u606f"
        run: |
          xcodebuild -version
          swift --version

      - name: "\u5b89\u88c5 XcodeGen"
        run: brew install xcodegen

      - name: "\u751f\u6210 Xcode \u5de5\u7a0b"
        run: xcodegen generate

      - name: "\u5217\u51fa\u53ef\u7528\u6a21\u62df\u5668"
        run: |
          echo "=== \u53ef\u7528 iOS \u6a21\u62df\u5668 ==="
          xcrun simctl list devices available | grep "iPhone" | head -10

      - name: "\u6a21\u62df\u5668\u6784\u5efa\uff08\u9a8c\u8bc1\u7f16\u8bd1\uff09"
        run: |
          SIM_NAME=$(xcrun simctl list devices available | grep "iPhone 16 Pro " | head -1 | sed 's/^ *//' | cut -d'(' -f1 | xargs)
          if [ -z "$SIM_NAME" ]; then
            SIM_NAME=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed 's/^ *//' | cut -d'(' -f1 | xargs)
          fi
          echo "\u6784\u5efa\u76ee\u6807: $SIM_NAME"

          xcodebuild clean build \
            -project DevQuest.xcodeproj \
            -scheme DevQuest \
            -destination "platform=iOS Simulator,name=$SIM_NAME,OS=latest" \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log

          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::\u6a21\u62df\u5668\u6784\u5efa\u5931\u8d25\uff0c\u9000\u51fa\u7801 $BUILD_EXIT"
            echo "=== \u6700\u540e 80 \u884c\u65e5\u5fd7 ==="
            tail -80 build.log
            exit 1
          fi
          echo "\u6a21\u62df\u5668\u6784\u5efa\u6210\u529f"

      - name: "\u771f\u673a\u6784\u5efa\uff08\u65e0\u7b7e\u540d ARM64\uff09"
        run: |
          xcodebuild build \
            -project DevQuest.xcodeproj \
            -scheme DevQuest \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee build-device.log

          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "\u7b2c\u4e00\u6b21\u5c1d\u8bd5\u5931\u8d25\uff0c\u91cd\u8bd5\u4e2d..."
            sleep 5
            xcodebuild build \
              -project DevQuest.xcodeproj \
              -scheme DevQuest \
              -destination 'generic/platform=iOS' \
              -configuration Debug \
              -derivedDataPath build/DerivedData \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              ONLY_ACTIVE_ARCH=NO \
              2>&1 | tee build-device.log
            BUILD_EXIT=${PIPESTATUS[0]}
          fi

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::\u771f\u673a\u6784\u5efa\u5931\u8d25"
            tail -80 build-device.log
            exit 1
          fi
          echo "\u771f\u673a\u6784\u5efa\u6210\u529f"

      - name: "\u6253\u5305 IPA"
        run: |
          APP_PATH=$(find build/DerivedData -name "DevQuest.app" -path "*/Debug-iphoneos/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build/DerivedData -name "DevQuest.app" -path "*-iphoneos/*" | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build/DerivedData -name "DevQuest.app" | head -1)
          fi

          if [ -n "$APP_PATH" ]; then
            echo "\u627e\u5230\u5e94\u7528: $APP_PATH"
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r DevQuest-unsigned.ipa Payload/
            echo "\u5df2\u521b\u5efa IPA:"
            ls -lh DevQuest-unsigned.ipa
          else
            echo "::error::\u672a\u627e\u5230 .app \u6587\u4ef6"
            find build/DerivedData/Build/Products/ -type d -maxdepth 3 2>/dev/null || true
            exit 1
          fi

      - name: "\u4e0a\u4f20 IPA \u4ea7\u7269"
        uses: actions/upload-artifact@v4
        with:
          name: DevQuest-unsigned-IPA
          path: DevQuest-unsigned.ipa
          if-no-files-found: error

      - name: "\u5931\u8d25\u65f6\u4e0a\u4f20\u6784\u5efa\u65e5\u5fd7"
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            build-device.log
