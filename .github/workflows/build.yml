name: Build DevQuest iOS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Find latest Xcode available on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: List available simulators
        run: |
          echo "=== Available iOS Simulators ==="
          xcrun simctl list devices available | grep -A 50 "iOS" | head -20

      - name: Build for Simulator
        run: |
          # Pick the first available iPhone simulator
          SIM_NAME=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed 's/^ *//' | cut -d'(' -f1 | xargs)
          echo "Building for simulator: $SIM_NAME"

          xcodebuild build \
            -project DevQuest.xcodeproj \
            -scheme DevQuest \
            -destination "platform=iOS Simulator,name=$SIM_NAME,OS=latest" \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee build.log

          echo "Build exit code: ${PIPESTATUS[0]}"
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::error::Build failed"
            exit 1
          fi

      - name: Package Simulator App
        run: |
          APP_PATH=$(find build/DerivedData -name "DevQuest.app" -path "*/Release-iphonesimulator/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build/DerivedData -name "DevQuest.app" | head -1)
          fi

          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            mkdir -p artifacts
            cd "$(dirname "$APP_PATH")"
            zip -r "$GITHUB_WORKSPACE/artifacts/DevQuest-simulator.zip" DevQuest.app
            echo "Packaged: DevQuest-simulator.zip"
          else
            echo "::warning::No .app bundle found"
            ls -R build/DerivedData/Build/Products/ || true
          fi

      - name: Upload Simulator Build
        uses: actions/upload-artifact@v4
        with:
          name: DevQuest-iOS-Simulator
          path: artifacts/DevQuest-simulator.zip
          if-no-files-found: warn

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
