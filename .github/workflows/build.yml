name: Build DevQuest iOS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build for Device (unsigned)
        run: |
          xcodebuild build \
            -project DevQuest.xcodeproj \
            -scheme DevQuest \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee build.log

          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::Build failed with exit code $BUILD_EXIT"
            tail -50 build.log
            exit 1
          fi
          echo "Build succeeded"

      - name: Package IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "DevQuest.app" -path "*/Release-iphoneos/*" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "Trying to find .app in any location..."
            APP_PATH=$(find build/DerivedData -name "DevQuest.app" | head -1)
          fi

          if [ -n "$APP_PATH" ]; then
            echo "Found app: $APP_PATH"
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r DevQuest-unsigned.ipa Payload/
            echo "Created: DevQuest-unsigned.ipa"
            ls -lh DevQuest-unsigned.ipa
          else
            echo "::error::No .app bundle found"
            find build/DerivedData/Build/Products/ -type d -maxdepth 3 || true
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DevQuest-unsigned-IPA
          path: DevQuest-unsigned.ipa
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
