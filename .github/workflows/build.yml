name: Build DevQuest iOS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          echo "Available Xcode versions:"
          ls -d /Applications/Xcode*.app 2>/dev/null

          # Prefer stable Xcode 16.x over beta 26.x
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          fi
          echo "Selected: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Show Xcode version
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: List available simulators
        run: |
          echo "=== Available iOS Simulators ==="
          xcrun simctl list devices available | grep "iPhone" | head -10

      - name: Build for Simulator
        run: |
          SIM_NAME=$(xcrun simctl list devices available | grep "iPhone 16 Pro " | head -1 | sed 's/^ *//' | cut -d'(' -f1 | xargs)
          if [ -z "$SIM_NAME" ]; then
            SIM_NAME=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed 's/^ *//' | cut -d'(' -f1 | xargs)
          fi
          echo "Building for: $SIM_NAME"

          xcodebuild clean build \
            -project DevQuest.xcodeproj \
            -scheme DevQuest \
            -destination "platform=iOS Simulator,name=$SIM_NAME,OS=latest" \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log

          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::Build failed with exit code $BUILD_EXIT"
            echo "=== Last 80 lines ==="
            tail -80 build.log
            exit 1
          fi
          echo "Build succeeded"

      - name: Re-build for Device (unsigned ARM64)
        run: |
          xcodebuild build \
            -project DevQuest.xcodeproj \
            -scheme DevQuest \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee build-device.log

          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "First attempt failed, retrying..."
            sleep 5
            xcodebuild build \
              -project DevQuest.xcodeproj \
              -scheme DevQuest \
              -destination 'generic/platform=iOS' \
              -configuration Debug \
              -derivedDataPath build/DerivedData \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              ONLY_ACTIVE_ARCH=NO \
              2>&1 | tee build-device.log
            BUILD_EXIT=${PIPESTATUS[0]}
          fi

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::Device build failed"
            tail -80 build-device.log
            exit 1
          fi
          echo "Device build succeeded"

      - name: Package IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "DevQuest.app" -path "*/Debug-iphoneos/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build/DerivedData -name "DevQuest.app" -path "*-iphoneos/*" | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build/DerivedData -name "DevQuest.app" | head -1)
          fi

          if [ -n "$APP_PATH" ]; then
            echo "Found app: $APP_PATH"
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r DevQuest-unsigned.ipa Payload/
            echo "Created IPA:"
            ls -lh DevQuest-unsigned.ipa
          else
            echo "::error::No .app bundle found"
            find build/DerivedData/Build/Products/ -type d -maxdepth 3 2>/dev/null || true
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DevQuest-unsigned-IPA
          path: DevQuest-unsigned.ipa
          if-no-files-found: error

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            build-device.log
